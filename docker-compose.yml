services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    volumes:
      - ./backend:/var/www/app:z
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "mysql://app:app@db:3306/avtomaster?serverVersion=11.2.0-MariaDB&charset=utf8mb4"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/app/public:ro,z
      - ./docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app:z
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app

  db:
    image: mariadb:11.2
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: avtomaster
      MARIADB_USER: app
      MARIADB_PASSWORD: app
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app

volumes:
  db_data:

networks:
  app:
    driver: bridge
