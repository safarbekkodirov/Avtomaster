services:
  - type: php
    name: avtomaster-api
    runtime: php-8-3
    region: oregon
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php bin/console server:run 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: avtomaster-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      - key: JWT_PASSPHRASE
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILER_SENDER_EMAIL
        value: noreply@avtomaster.kg
      - key: MAILER_SENDER_NAME
        value: Avtomaster
      - key: FRONTEND_URL
        value: https://avtomaster.onrender.com
      - key: MESSENGER_TRANSPORT_DSN
        fromDatabase:
          name: avtomaster-redis
          property: connectionString

databases:
  - name: avtomaster-db
    plan: free
    databaseName: avtomaster
    user: avtomaster

  - name: avtomaster-redis
    plan: free
