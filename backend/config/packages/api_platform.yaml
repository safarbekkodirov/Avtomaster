api_platform:
    title: 'Avtomaster API'
    description: 'Avtomaster auto mechanic search platform'
    version: '0.0.1'

    use_symfony_listeners: true

    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
        mergePatchJson: ['application/merge-patch+json']

    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

    swagger:
        versions: [3]
        api_keys:
            apiKey:
                name: Authorization
                type: header
