security:
    password_hashers:
        App\Entity\User: auto

    providers:
        entity_provider:
            entity:
                class: App\Entity\User
                property: email

        jwt:
            lexik_jwt:
                class: App\Component\User\Dtos\JwtUserDto

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        docs_jsonld:
            pattern: ^/api/v1/docs.jsonld$
            security: false
            methods:
                - get

        contexts_entrypoint:
            pattern: ^/api/v1/contexts/Entrypoint$
            security: false
            methods:
                - get

        user_auth:
            pattern: ^/api/v1/users/auth$
            security: false
            methods:
                - post

        user_auth_refreshToken:
            pattern: ^/api/v1/users/auth/refreshToken$
            security: false
            methods:
                - post

        user_is_unique_email:
            pattern: ^/api/v1/users/is_unique_email/?$
            security: false
            methods:
                - post

        user_create:
            pattern: ^/api/v1/users/?$
            security: false
            methods:
                - post

        doc:
            pattern: ^/api/v1/?$
            security: false
            methods:
                - get

        masters_search:
            pattern: ^/api/v1/masters/search/?$
            security: false
            methods:
                - get

        masters_public:
            pattern: ^/api/v1/masters(/\d+)?/?$
            security: false
            methods:
                - get

        masters_services_public:
            pattern: ^/api/v1/master_services(/\d+)?/?$
            security: false
            methods:
                - get

        regions_public:
            pattern: ^/api/v1/regions(/\d+)?/?$
            security: false
            methods:
                - get

        categories_public:
            pattern: ^/api/v1/service_categories(/\d+)?/?$
            security: false
            methods:
                - get

        masters_reviews_public:
            pattern: ^/api/v1/masters/\d+/reviews/?$
            security: false
            methods:
                - get

        contexts_public:
            pattern: ^/api/v1/contexts/
            security: false
            methods:
                - get

        main:
            stateless: true
            security: true
            provider: entity_provider
            jwt: ~

    access_control:
        - { path: ^/api/v1/users/?$, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [post] }
        - { path: ^/api/v1/users/auth/?$, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/v1/users/auth/refreshToken, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/v1/users/is_unique_email, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/v1/masters/search, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/v1/masters/\d+$, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [get] }
        - { path: ^/api/v1/master_services, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [get] }
        - { path: ^/api/v1/regions, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [get] }
        - { path: ^/api/v1/service_categories, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [get] }
        - { path: ^/api/v1/masters/\d+/reviews, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [get] }
        - { path: ^/api/v1/.+, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1, roles: IS_AUTHENTICATED_ANONYMOUSLY }
