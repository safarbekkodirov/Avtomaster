security:
    password_hashers:
        App\Entity\User: auto

    providers:
        entity_provider:
            entity:
                class: App\Entity\User
                property: email

        jwt:
            lexik_jwt:
                class: App\Component\User\Dtos\JwtUserDto

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        docs_jsonld:
            pattern: ^/api/v1/docs.jsonld$
            security: false
            methods:
                - get

        contexts_entrypoint:
            pattern: ^/api/v1/contexts/Entrypoint$
            security: false
            methods:
                - get

        user_auth:
            pattern: ^/api/v1/users/auth$
            security: false
            methods:
                - post

        user_auth_refreshToken:
            pattern: ^/api/v1/users/auth/refreshToken$
            security: false
            methods:
                - post

        user_is_unique_email:
            pattern: ^/api/v1/users/is_unique_email/?$
            security: false
            methods:
                - post

        user_create:
            pattern: ^/api/v1/users/?$
            security: false
            methods:
                - post

        doc:
            pattern: ^/api/v1/?$
            security: false
            methods:
                - get

        main:
            stateless: true
            security: true
            provider: entity_provider
            jwt: ~

    access_control:
        - { path: ^/api/v1/.+, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1, roles: IS_AUTHENTICATED_ANONYMOUSLY }
