services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/app:z
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "mysql://app:app@db:3306/avtomaster?serverVersion=11.2.0-MariaDB&charset=utf8mb4"
      STRIPE_SECRET_KEY: "sk_test_mock"
      STRIPE_WEBHOOK_SECRET: "whsec_mock"
      MAILER_DSN: "smtp://mailpit:1025"
      MAILER_SENDER_EMAIL: "noreply@avtomaster.kg"
      MAILER_SENDER_NAME: "Avtomaster"
      FRONTEND_URL: "http://localhost:8080"
      MESSENGER_TRANSPORT_DSN: "redis://redis:6379/messages"
      JWT_PASSPHRASE: "avtomaster_jwt_passphrase_2024"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/app/public:ro,z
      - ./docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - nginx
    networks:
      - app

  db:
    image: mariadb:11.2
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: avtomaster
      MARIADB_USER: app
      MARIADB_PASSWORD: app
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - app
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app

volumes:
  db_data:

networks:
  app:
    driver: bridge
